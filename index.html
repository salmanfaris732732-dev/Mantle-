<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Mantle - System Architecture & Financial Engine</title>
  
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  
  <!-- Pin Marked.js to v4.3.0 to prevent breaking signature changes -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  
  <!-- Mermaid.js for diagram rendering -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.2.4/dist/mermaid.min.js"></script>

  <style>
    :root {
      --bg-dark: #050814;
      --bg-surface: #0a0f24;
      --bg-card: rgba(13, 20, 45, 0.45);
      --bg-hover: rgba(30, 41, 59, 0.8);
      --primary: #3b82f6;
      --primary-neon: #60a5fa;
      --secondary: #10b981;
      --secondary-neon: #34d399;
      --accent: #f59e0b;
      --danger: #f43f5e;
      --text-main: #f1f5f9;
      --text-muted: #64748b;
      --border-color: rgba(255, 255, 255, 0.05);
      --glow-blue: 0 0 30px rgba(59, 130, 246, 0.25);
      --glow-green: 0 0 30px rgba(16, 185, 129, 0.25);
      --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.12) 0px, transparent 40%),
        radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 40%),
        radial-gradient(at 50% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.7;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #ffffff;
      margin-top: 1.8em;
      margin-bottom: 0.6em;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff 30%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 0;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5em;
    }

    h2 {
      font-size: 1.85rem;
      color: #ffffff;
      position: relative;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--border-color);
    }
    h2::before {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 60px;
      height: 2px;
      background: linear-gradient(to right, var(--primary-neon), var(--secondary-neon));
    }

    h3 {
      font-size: 1.35rem;
      color: var(--primary-neon);
    }

    p {
      margin-bottom: 1.4em;
      color: #cbd5e1;
      font-size: 1.05rem;
    }

    a {
      color: var(--primary-neon);
      text-decoration: none;
      transition: color 0.2s;
    }
    a:hover {
      color: var(--secondary-neon);
    }

    /* Top Navigation Bar */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(5, 8, 20, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 2.2rem;
      height: 2.2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: #fff;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .view-modes {
      display: flex;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.3rem;
      border-radius: 10px;
      border: 1px solid var(--border-color);
    }

    .view-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .view-btn.active {
      background: linear-gradient(135deg, var(--primary), #1d4ed8);
      color: #ffffff;
      box-shadow: var(--glow-blue);
    }

    /* Portal Layout (Stripe Docs Style) */
    .portal-layout {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 3rem;
    }

    /* Sidebar Navigation */
    .sidebar-nav {
      position: sticky;
      top: 90px;
      height: calc(100vh - 120px);
      overflow-y: auto;
      padding-right: 1rem;
      border-right: 1px solid var(--border-color);
    }

    .sidebar-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .sidebar-menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .sidebar-link {
      display: block;
      color: #94a3b8;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .sidebar-link:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.03);
    }
    .sidebar-link.active {
      color: var(--primary-neon);
      background: rgba(59, 130, 246, 0.08);
      border-left: 3px solid var(--primary-neon);
      border-radius: 0 8px 8px 0;
      padding-left: 0.8rem;
      font-weight: 600;
    }

    /* Document View Card */
    .document-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 4rem;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
    }
    .document-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      border-radius: 20px 20px 0 0;
    }

    /* Badge styles */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid;
      margin-right: 0.5rem;
    }
    .badge-primary {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.3);
      color: var(--primary-neon);
    }
    .badge-secondary {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
      color: var(--secondary-neon);
    }

    /* GitHub Alert Callouts */
    .alert {
      padding: 1.25rem 1.5rem;
      margin: 1.8rem 0;
      border-left: 4px solid;
      border-radius: 0 12px 12px 0;
      background: rgba(255, 255, 255, 0.01);
      border-top: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    .alert-important {
      border-left-color: var(--danger);
      background: rgba(244, 63, 94, 0.02);
    }
    .alert-note {
      border-left-color: var(--primary);
      background: rgba(59, 130, 246, 0.02);
    }
    .alert-tip {
      border-left-color: var(--secondary);
      background: rgba(16, 185, 129, 0.02);
    }
    .alert-warning {
      border-left-color: var(--accent);
      background: rgba(245, 158, 11, 0.02);
    }
    .alert-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .alert-important .alert-title { color: var(--danger); }
    .alert-note .alert-title { color: var(--primary-neon); }
    .alert-tip .alert-title { color: var(--secondary-neon); }
    .alert-warning .alert-title { color: var(--accent); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 2.5rem 0;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }
    th, td {
      padding: 1.1rem 1.4rem;
      text-align: left;
    }
    th {
      background-color: rgba(59, 130, 246, 0.08);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      border-bottom: 2px solid var(--border-color);
    }
    td {
      font-size: 0.95rem;
      color: #cbd5e1;
    }
    tr {
      border-bottom: 1px solid var(--border-color);
      transition: background-color 0.2s;
    }
    tr:hover {
      background-color: rgba(255, 255, 255, 0.02);
    }
    tr:last-child {
      border-bottom: none;
    }

    /* Lists */
    ul, ol {
      margin-left: 1.8rem;
      margin-bottom: 1.5rem;
      color: #cbd5e1;
    }
    li {
      margin-bottom: 0.5rem;
      padding-left: 0.2rem;
    }

    /* Inline Code and Codeblocks */
    code {
      font-family: 'Consolas', 'Monaco', monospace;
      background: rgba(255, 255, 255, 0.06);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
      color: var(--primary-neon);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }
    pre code {
      display: block;
      padding: 1.4rem;
      overflow-x: auto;
      background: #060914;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: #e2e8f0;
      margin: 2rem 0;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    /* Interactive Commodity Arbitrage Simulator Widget */
    .simulator-widget {
      background: linear-gradient(135deg, #090e21, #040712);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 16px;
      padding: 2rem;
      margin: 2.5rem 0;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), var(--glow-blue);
      position: relative;
      overflow: hidden;
    }
    .simulator-widget::after {
      content: 'AI ARBITRAGE SIMULATOR';
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .sim-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .sim-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 10px var(--danger);
    }
    .sim-dot.active {
      background: var(--secondary);
      box-shadow: 0 0 10px var(--secondary);
    }
    .sim-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: #ffffff;
    }
    .sim-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .sim-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
      transition: all 0.3s;
    }
    .sim-card:hover {
      border-color: rgba(59, 130, 246, 0.2);
      transform: translateY(-2px);
    }
    .sim-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    .sim-value {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #ffffff;
    }
    .sim-value.green { color: var(--secondary-neon); }
    .sim-value.blue { color: var(--primary-neon); }
    
    .sim-terminal {
      background: #020308;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.85rem;
      color: #34d399;
      padding: 1.2rem;
      height: 180px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
    }
    .sim-log-line {
      margin-bottom: 0.3rem;
      opacity: 0.9;
    }
    .sim-action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sim-btn {
      background: linear-gradient(135deg, var(--primary), #2563eb);
      color: #ffffff;
      border: none;
      padding: 0.8rem 1.6rem;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }
    .sim-btn:hover {
      background: linear-gradient(135deg, var(--primary-neon), var(--primary));
      box-shadow: var(--glow-blue);
      transform: translateY(-1px);
    }
    .sim-btn:disabled {
      background: #1e293b;
      color: var(--text-muted);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* Dynamic Pipeline Status Tracker Widget */
    .pipeline-widget {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      margin: 2.5rem 0;
    }
    .pipeline-steps {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin-top: 1.5rem;
    }
    .pipeline-steps::before {
      content: '';
      position: absolute;
      top: 25px;
      left: 10%;
      right: 10%;
      height: 2px;
      background: #1e293b;
      z-index: 1;
    }
    .pipeline-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
      width: 20%;
    }
    .pipeline-indicator {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #0a0f24;
      border: 2px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      transition: all 0.4s;
    }
    .pipeline-step.active .pipeline-indicator {
      border-color: var(--primary-neon);
      box-shadow: var(--glow-blue);
      color: var(--primary-neon);
      background: rgba(59, 130, 246, 0.1);
    }
    .pipeline-step.completed .pipeline-indicator {
      border-color: var(--secondary);
      box-shadow: var(--glow-green);
      color: var(--secondary);
      background: rgba(16, 185, 129, 0.1);
    }
    .pipeline-step-label {
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pipeline-step.active .pipeline-step-label {
      color: #ffffff;
    }
    .pipeline-step.completed .pipeline-step-label {
      color: var(--secondary-neon);
    }

    /* Embedded Images */
    img {
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      margin: 2rem 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      transition: transform 0.3s;
    }
    img:hover {
      transform: scale(1.01);
    }

    /* Interactive Presentation Carousel */
    .carousel-container {
      background: linear-gradient(135deg, #090e21, #050815);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      margin: 3rem 0;
      box-shadow: var(--glass-shadow);
      aspect-ratio: 16/10;
      display: flex;
      flex-direction: column;
    }

    .carousel-slides {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
      height: 100%;
      flex-grow: 1;
    }

    .carousel-slide {
      min-width: 100%;
      box-sizing: border-box;
      padding: 3.5rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
    }

    .carousel-slide h1 {
      font-size: 2.2rem;
      font-weight: 900;
      margin-top: 0;
      margin-bottom: 0.2rem;
      border-bottom: none;
      background: linear-gradient(to right, #ffffff, #64748b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .carousel-slide h3 {
      color: var(--secondary-neon);
      font-size: 1.15rem;
      margin-top: 0;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }
    
    .carousel-slide-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: center;
      flex-grow: 1;
    }

    .carousel-slide-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .carousel-slide-text ul {
      margin-left: 1.2rem;
      margin-top: 1rem;
    }
    
    .carousel-slide img {
      max-height: 280px;
      width: 100%;
      object-fit: cover;
      margin: 0;
      border-radius: 12px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid var(--border-color);
      color: #fff;
      width: 3.2rem;
      height: 3.2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 10;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .carousel-btn:hover {
      background: var(--primary);
      box-shadow: var(--glow-blue);
      border-color: var(--primary-neon);
      transform: translateY(-50%) scale(1.05);
    }
    .carousel-btn-prev { left: 1.5rem; }
    .carousel-btn-next { right: 1.5rem; }

    .carousel-indicators {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.6rem;
      z-index: 10;
    }

    .carousel-indicator {
      width: 1.2rem;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .carousel-indicator.active {
      background: var(--primary-neon);
      width: 2.5rem;
      box-shadow: var(--glow-blue);
    }

    /* Mermaid Rendering Styling overrides */
    .mermaid {
      background: #02040a;
      padding: 2rem;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: center;
      margin: 2rem 0;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
    }

    /* LaTeX blocks centering */
    .katex-display {
      margin: 2rem 0;
      padding: 1.2rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      overflow-x: auto;
    }

    /* Footer styling */
    footer {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-muted);

## 4. AI & Automation Stack

Mantle replaces manual procurement, logistics coordination, and administrative auditing with an autonomous agentic stack built on **n8n** and **Google AI Studio (Gemini)**.

### 4.1 Workflow Orchestration via n8n
Mantle implements **n8n** as its enterprise-grade workflow engine. n8n acts as the event-driven middleware, responding to state changes in CoreGrid, market price fluctuations, and operational alerts.

*   **Data Routing Pipelines:** Event triggers execute asynchronous workflows that route data between internal applications, cloud repositories, and third-party APIs (shipping companies, customs databases, financial institutions).
*   **Fault Tolerance:** Automated retry mechanisms and dead-letter queues guarantee transactional consistency for critical logistics and financial movements.

### 4.2 Cognitive Analysis via Google AI Studio
Using the Gemini API via Google AI Studio, Mantle processes unstructured and semi-structured text data to inform transactional decisions.

*   **Contractual Parsing:** Ingests complex global trade contracts, automatically identifying delivery conditions, liability clauses, and pricing formulas.
*   **Market Sentiment Ingestion:** Scans global trade journals, geopolitical news feeds, and macroeconomic announcements to predict regional shifts in commodity demand.

### 4.3 Commodity Price Arbitrage Engine
Mantle utilizes a proprietary automation workflow to maximize raw material yield through real-time spot market arbitrage.

#### 4.3.1 Arbitrage Spread Formula
The engine evaluates procurement actions using the following margin optimization function:

$$\text{Arbitrage Spread } (\Delta) = P_{\text{Virgin}} - \left( P_{\text{Scrap}} + C_{\text{Logistics}} + C_{\text{Processing}} \right) + E_{\text{Carbon Credit}}$$

Where:
*   $P_{\text{Virgin}}$ = Current spot price of virgin raw materials (LME Index).
*   $P_{\text{Scrap}}$ = Current purchase price of recycled materials via the SmartCycle supplier network.
*   $C_{\text{Logistics}}$ = Total transit costs (freight, insurance, customs tariffs) routed through JAFZA.
*   $C_{\text{Processing}}$ = Operational cost of sorting/refining scrap to manufacturing tolerances at Icobo Heavy Industries.
*   $E_{\text{Carbon Credit}}$ = Financial value of carbon offset certificates earned by utilizing recycled feedstock.

> [!TIP]
> **Operational Best Practice:** If $\Delta > \$120 \text{ per metric ton}$, the n8n system automatically triggers maximum scrap procurement, bypassing human authorization for transactions up to $\$250,000$ USD.

### 4.4 Cross-Border Capital Routing & Logistics Automation
Operating through tax-neutral logistics hubs like the Jebel Ali Free Zone (JAFZA) in Dubai, Mantle automates the paperwork and regulatory compliance required for fluid capital and material flows.

*   **Document Generation:** n8n automatically compiles customs declarations, bills of lading, and certificates of origin for JAFZA customs authorities.
*   **Capital Routing:** When commodity transactions are cleared, Mantle initiates automated wire transfers and currency swaps through API-enabled treasury platforms, routing liquid funds through optimal international banking corridors.

### 5.1 Data Transfer Pricing Model
The Icobo Group structures its operations so that local subsidiaries in high-tax jurisdictions (e.g., Europe, North America) license Mantle's proprietary software suite, database architecture, and AI models.

*   **Licensing Fee Structure:** Subsidiaries pay licensing fees to the parent entity or a specialized IP-holding subsidiary registered in a tax-neutral free zone (like JAFZA).
*   **Data Transfer Fees:** Subsidiaries pay structured "Data Transfer Fees" to access the real-time arbitrage data, AI scheduling algorithms, and centralized customer leads generated by Mantle.
*   **Tax Optimization:** These licensing and data transfer fees are classified as deductible operating expenses in the subsidiary's local jurisdiction, reducing their taxable net income. Simultaneously, the licensing revenue is received in a zero-tax or low-tax jurisdiction, legally optimizing the group's global effective tax rate.

### 5.2 Compliance and Regulatory Defensibility
To ensure adherence to international taxation standards, Mantle's transfer pricing architecture complies with the **OECD Transfer Pricing Guidelines for Multinational Enterprises and Tax Administrations** and **BEPS Actions 8-10**.

| **Transfer Pricing Documentation** | Mantle automatically generates localized transfer pricing reports, master files, and local files to defend the data transfer fee calculations during sovereign tax audits. |

    }

    // Setup custom marked renderer and preprocess blockquotes
    function setupMarked() {
      const renderer = new marked.Renderer();

      // Custom blockquote rendering to convert > [!NOTE] to styled alerts
      renderer.blockquote = function(quote) {
        let rawQuote = typeof quote === 'string' ? quote : (quote.text || "");
        const cleaned = rawQuote.replace(/<\/?p>/g, '').trim();
        const match = cleaned.match(/^\[!(IMPORTANT|NOTE|TIP|WARNING)\]\s*(.*)/is);
        
        if (match) {
          const type = match[1].toLowerCase();
          const content = match[2];
          
          let icon = "🔔";
          if (type === "important") icon = "⚠️";
          if (type === "tip") icon = "💡";
          if (type === "warning") icon = "🔥";
          
          return `<div class="alert alert-${type}"><div class="alert-title">${icon} ${type}</div><p>${content}</p></div>`;
        }
        return `<blockquote>${rawQuote}</blockquote>`;
      };

      // Custom codeblock rendering for carousels, widgets and mermaid
      const defaultCode = renderer.code.bind(renderer);
      renderer.code = function(code, language, escaped) {
        let rawCode = typeof code === 'string' ? code : (code.text || "");
        let lang = typeof code === 'string' ? (language || "") : (code.lang || "");

        if (lang === 'carousel') {
          return parseCarouselCodeblock(rawCode);
        }
        if (lang === 'mermaid') {
          return `<pre class="mermaid">${rawCode}</pre>`;
        }
        return defaultCode(code, language, escaped);
      };

      marked.setOptions({
        renderer: renderer,
        gfm: true,
        breaks: true
      });
    }

    // Custom Slide Deck rendering logic
    function parseCarouselCodeblock(content) {
      const slidesContent = content.split(/<!--\s*slide\s*-->/gi);
      let slidesHTML = "";
      
      slidesContent.forEach((slideMD, index) => {
        // Parse slide markdown
        const slideLines = slideMD.trim().split(/\n/);
        const titleLine = slideLines[0] || "";
        const subtitleLine = slideLines[1] || "";
        
        let bodyLines = slideLines.slice(2).join("\n");
        
        // Extract images and text
        let imageHTML = "";
        let cleanMD = bodyLines.replace(/!\[(.*?)\]\((.*?)\)/g, (match, alt, src) => {
          imageHTML = `<img src="${src}" alt="${alt}">`;
          return "";
        });

        const renderedBodyHTML = marked.parse(cleanMD);

        slidesHTML += `
          <div class="carousel-slide" data-slide-index="${index}">
            ${marked.parse(titleLine)}
            ${marked.parse(subtitleLine)}
            <div class="carousel-slide-content">
              <div class="carousel-slide-text">${renderedBodyHTML}</div>
              ${imageHTML ? imageHTML : '<div class="sim-card"><div class="sim-label">System Module</div><div class="sim-value blue">ACTIVE</div></div>'}
            </div>
          </div>`;
      });

      let indicatorsHTML = "";
      slidesContent.forEach((_, index) => {
        indicatorsHTML += `<div class="carousel-indicator ${index === 0 ? 'active' : ''}" onclick="jumpToSlide(this, ${index})"></div>`;
      });

      return `
        <div class="carousel-container">
          <button class="carousel-btn carousel-btn-prev" onclick="moveSlide(this, -1)">←</button>
          <button class="carousel-btn carousel-btn-next" onclick="moveSlide(this, 1)">→</button>
          <div class="carousel-slides" style="transform: translateX(0%);">
            ${slidesHTML}
          </div>
          <div class="carousel-indicators">
            ${indicatorsHTML}
          </div>
        </div>
      `;
    }

    // Carousel Slide Transitions
    function moveSlide(button, direction) {
      const container = button.closest(".carousel-container");
      const slides = container.querySelectorAll(".carousel-slide");
      let currentIndex = parseInt(container.dataset.currentIndex || "0");
      let nextIndex = currentIndex + direction;
      
      if (nextIndex < 0) nextIndex = slides.length - 1;
      if (nextIndex >= slides.length) nextIndex = 0;
      
      setCarouselSlide(container, nextIndex);
    }

    function jumpToSlide(indicator, index) {
      const container = indicator.closest(".carousel-container");
      setCarouselSlide(container, index);
    }

    function setCarouselSlide(container, index) {
      const slidesWrapper = container.querySelector(".carousel-slides");
      const indicators = container.querySelectorAll(".carousel-indicator");
      
      container.dataset.currentIndex = index;
      slidesWrapper.style.transform = `translateX(-${index * 100}%)`;
      
      indicators.forEach((ind, i) => {
        if (i === index) ind.classList.add("active");
        else ind.classList.remove("active");
      });
    }

    function initCarousel(container) {
      container.dataset.currentIndex = "0";
      const slidesWrapper = container.querySelector(".carousel-slides");
      if (slidesWrapper) slidesWrapper.style.transform = `translateX(0%)`;
      const indicators = container.querySelectorAll(".carousel-indicator");
      indicators.forEach((ind, i) => {
        if (i === 0) ind.classList.add("active");
        else ind.classList.remove("active");
      });
    }

    // Math render
    function renderMath(text) {
      let replaced = text.replace(/\$\$([\s\S]*?)\$\$/g, (match, equation) => {
        try {
          return katex.renderToString(equation.trim(), { displayMode: true, throwOnError: false });
        } catch (e) {
          return match;
        }
      });

      replaced = replaced.replace(/\$([\s\S]*?)\$/g, (match, equation) => {
        try {
          return katex.renderToString(equation.trim(), { displayMode: false, throwOnError: false });
        } catch (e) {
          return match;
        }
      });
      return replaced;
    }

    // Add Section IDs for scroll-spy linkage
    function addSectionIds(html) {
      const container = document.createElement("div");
      container.innerHTML = html;

      // Make title page id
      const title = container.querySelector("h1");
      if (title) {
        title.id = "sec-title";
        // Wrap title and version tags
        title.innerHTML = `<span class="badge badge-primary">SYSTEM V1.1.0</span> <span class="badge badge-secondary">ICOBO ORIGIN</span><br>` + title.innerHTML;
      }

      // Query all headings to give them scrollable anchor IDs
      const headings = container.querySelectorAll("h2");
      headings.forEach(heading => {
        // Generate a clean slug
        const text = heading.textContent;
        const slug = text.toLowerCase()
          .replace(/[^\w\s-]/g, '')
          .replace(/\s+/g, '-');
        heading.id = slug;
      });

      return container.innerHTML;
    }

    // Add widgets directly into the HTML
    function injectWidgets(html) {
      const container = document.createElement("div");
      container.innerHTML = html;

      // 1. Inject Simulator Widget after the Commodity Arbitrage section
      const arbitrageHeading = Array.from(container.querySelectorAll("h3")).find(el => el.textContent.includes("Commodity Price Arbitrage"));
      if (arbitrageHeading) {
        const widgetHTML = `
          <div class="simulator-widget" id="arbitrage-sim">
            <div class="sim-header">
              <div class="sim-dot" id="sim-light"></div>
              <div class="sim-title" id="sim-status">PIPELINE IDLE</div>
            </div>
            <div class="sim-grid">
              <div class="sim-card">
                <div class="sim-label">LME Copper (Virgin)</div>
                <div class="sim-value" id="val-virgin">$8,450 /t</div>
              </div>
              <div class="sim-card">
                <div class="sim-label">SmartCycle (Recycled)</div>
                <div class="sim-value green" id="val-scrap">$7,120 /t</div>
              </div>
              <div class="sim-card">
                <div class="sim-label">Arbitrage Spread (Δ)</div>
                <div class="sim-value blue" id="val-spread">$1,060 /t</div>
              </div>
            </div>
            <div class="sim-terminal" id="sim-terminal-logs">
              [System Initialized] Standing by for LME API cron triggers...<br>
              Click "Execute Arbitrage" below to simulate a real-time contract routing cycle.
            </div>
            <div class="sim-action-bar">
              <button class="sim-btn" id="sim-btn-run" onclick="runArbitrageSimulation()">Execute Arbitrage</button>
              <div style="font-size: 0.8rem; color: var(--text-muted);">Formula: Δ = P_Virgin - (P_Scrap + $350 Logistics) + $80 ESG</div>
            </div>
          </div>
        `;
        const temp = document.createElement("div");
        temp.innerHTML = widgetHTML;
        arbitrageHeading.after(temp.firstElementChild);
      }

      // 2. Inject n8n pipeline visualization
      const n8nHeading = Array.from(container.querySelectorAll("h3")).find(el => el.textContent.includes("Workflow Orchestration"));
      if (n8nHeading) {
        const pipelineHTML = `
          <div class="pipeline-widget">
            <div class="sim-label">n8n Execution Pipeline</div>
            <div class="pipeline-steps">
              <div class="pipeline-step completed" id="step-1">
                <div class="pipeline-indicator">01</div>
                <div class="pipeline-step-label">Ingress</div>
              </div>
              <div class="pipeline-step" id="step-2">
                <div class="pipeline-indicator">02</div>
                <div class="pipeline-step-label">AI Analysis</div>
              </div>
              <div class="pipeline-step" id="step-3">
                <div class="pipeline-indicator">03</div>
                <div class="pipeline-step-label">Customs Gateway</div>
              </div>
              <div class="pipeline-step" id="step-4">
                <div class="pipeline-indicator">04</div>
                <div class="pipeline-step-label">JAFZA Invoicing</div>
              </div>
            </div>
          </div>
        `;
        const temp = document.createElement("div");
        temp.innerHTML = pipelineHTML;
        n8nHeading.after(temp.firstElementChild);
      }

      return container.innerHTML;
    }

    // Dynamic Arbitrage Simulator Execution
    async function runArbitrageSimulation() {
      const button = document.getElementById("sim-btn-run");
      const light = document.getElementById("sim-light");
      const statusText = document.getElementById("sim-status");
      const logs = document.getElementById("sim-terminal-logs");
      const step2 = document.getElementById("step-2");
      const step3 = document.getElementById("step-3");
      const step4 = document.getElementById("step-4");
      
      const vVal = document.getElementById("val-virgin");
      const sVal = document.getElementById("val-scrap");
      const spVal = document.getElementById("val-spread");

      // Disable button during execution
      button.disabled = true;
      light.className = "sim-dot active";
      light.style.background = "#eab308"; // yellow
      light.style.boxShadow = "0 0 10px #eab308";
      statusText.textContent = "EXECUTING PIPELINE...";
      logs.innerHTML = "";

      const appendLog = (msg) => {
        logs.innerHTML += `<div class="sim-log-line">> ${msg}</div>`;
        logs.scrollTop = logs.scrollHeight;
      };

      // Step 1: Fetch Prices
      appendLog("n8n Trigger: Ingesting LME copper futures and regional SmartCycle feeds...");
      await new Promise(resolve => setTimeout(resolve, 800));
      
      // Randomize values
      const virginVal = Math.floor(8300 + Math.random() * 300);
      const scrapVal = Math.floor(6900 + Math.random() * 200);
      const spread = virginVal - (scrapVal + 350) + 80;

      vVal.textContent = `$${virginVal} /t`;
      sVal.textContent = `$${scrapVal} /t`;
      spVal.textContent = `$${spread} /t`;
      appendLog(`LME Copper parsed: $${virginVal}/ton. SmartCycle Scrap parsed: $${scrapVal}/ton.`);

      // Step 2: AI Evaluation
      step2.classList.add("active");
      appendLog("Google AI Studio: Forwarding news feeds & spread data to Gemini-1.5-Pro...");
      await new Promise(resolve => setTimeout(resolve, 1000));
      
      const decision = spread > 120 ? "BUY SCRAP FEEDSTOCK (MAXIMUM VOLUME)" : "HOLD PURCHASES / UTILISED STOCK RESERVES";
      appendLog(`Gemini Agent Decision: ${decision}`);
      step2.classList.replace("active", "completed");

      // Step 3: Logistics routing
      step3.classList.add("active");
      appendLog(`Triggering JAFZA customs clearance automation for Jebel Ali freight corridor...`);
      await new Promise(resolve => setTimeout(resolve, 900));
      appendLog("Customs documents generated. Digital manifest transmitted to Icobo Heavy Industries.");
      step3.classList.replace("active", "completed");

      // Step 4: Ledger & Invoicing
      step4.classList.add("active");
      appendLog(`Intra-group transfer pricing fee of $${spread}/ton invoiced to EU subsidiary.`);
      await new Promise(resolve => setTimeout(resolve, 800));
      appendLog(`Licensing royalty routed to JAFZA IP Holding Ltd. Capital pipeline cleared.`);
      step4.classList.replace("active", "completed");

      // Wrap up
      light.style.background = "var(--secondary)";
      light.style.boxShadow = "0 0 10px var(--secondary)";
      statusText.textContent = "PIPELINE COMPLETED - SUCCESS";
      appendLog("System standing by.");
      
      button.disabled = false;
      
      // Reset pipeline indicators after delay
      setTimeout(() => {
        step2.className = "pipeline-step";
        step3.className = "pipeline-step";
        step4.className = "pipeline-step";
      }, 5000);
    }

    // Main initialisation
    window.addEventListener('DOMContentLoaded', async () => {
      setupMarked();
      
      try {
        // Attempt to fetch dynamically first (e.g. if running via a local server)
        const response = await fetch('Mantle_Project_Report.md');
        if (!response.ok) throw new Error("Failed to load Mantle_Project_Report.md");
        rawMarkdown = await response.text();
      } catch (err) {
        console.warn("Could not fetch dynamically (likely running via file:// protocol). Falling back to inlined markdown. Error:", err.message);
        // Fallback to inlined markdown in index.html
        const inlineMD = document.getElementById("markdown-content");
        if (inlineMD) {
          rawMarkdown = inlineMD.textContent.trim();
        } else {
          // If no inline markdown exists, display the critical error
          document.getElementById("report-content").innerHTML = `
            <div class="alert alert-important">
              <div class="alert-title">Critical Loading Error</div>
              <p>Could not load or parse the project report markdown file: ${err.message}</p>
            </div>
          `;
          return;
        }
      }
      
      try {
        // Render Markdown to HTML
        let htmlContent = marked.parse(rawMarkdown);
        
        // Render math elements
        htmlContent = renderMath(htmlContent);

        // Add section IDs for navigation links
        htmlContent = addSectionIds(htmlContent);

        // Inject widgets
        htmlContent = injectWidgets(htmlContent);

        // Put rendered HTML in container
        const target = document.getElementById("report-content");
        target.innerHTML = htmlContent;
        target.classList.add("animated-content");

        // Initialize Mermaid
        mermaid.initialize({
          theme: 'dark',
          startOnLoad: false,
          securityLevel: 'loose',
          flowchart: { useMaxWidth: true, htmlLabels: true }
        });
        
        await mermaid.run({
          nodes: document.querySelectorAll('.mermaid'),
        });

        // Build the dynamic sidebar navigation links
        buildSidebar();

        // Initialize inline carousels in doc mode
        document.querySelectorAll(".carousel-container").forEach(container => {
          initCarousel(container);
        });

        // Trigger scroll spy
        window.dispatchEvent(new Event('scroll'));

      } catch (err) {
        console.error(err);
        document.getElementById("report-content").innerHTML = `
          <div class="alert alert-important">
            <div class="alert-title">Critical Rendering Error</div>
            <p>Could not parse or render markdown: ${err.message}</p>
          </div>
        `;
      }
    });
  </script>
