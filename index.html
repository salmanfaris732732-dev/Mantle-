<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Mantle - System Architecture & Financial Engine</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  
  <!-- Pin Marked.js to v4.3.0 to prevent breaking signature changes -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  
  <!-- Mermaid.js for diagram rendering -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.2.4/dist/mermaid.min.js"></script>

  <style>
    :root {
      --bg-dark: #0a0f1d;
      --bg-card: rgba(18, 26, 47, 0.6);
      --bg-hover: rgba(30, 41, 59, 0.8);
      --primary: #3b82f6;
      --primary-neon: #60a5fa;
      --secondary: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      padding: 0;
      margin: 0;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
    }

    h1 {
      font-size: 2.5rem;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 0.3em;
      margin-top: 0;
    }

    h2 {
      font-size: 1.8rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.2em;
      color: var(--primary-neon);
    }

    p {
      margin-bottom: 1.2em;
      color: #e2e8f0;
      font-size: 1.05rem;
    }

    /* Top Navigation Bar */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(10, 15, 29, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 2rem;
      height: 2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      color: #fff;
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(to right, #ffffff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .view-modes {
      display: flex;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.25rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .view-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .view-btn.active {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    /* Main Container layout */
    .container {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    /* Document View Card */
    .document-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 3rem;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform 0.3s ease;
    }

    /* GitHub Alert Callouts */
    .alert {
      padding: 1rem 1.25rem;
      margin: 1.5rem 0;
      border-left: 4px solid;
      border-radius: 0 8px 8px 0;
      background: rgba(255, 255, 255, 0.02);
    }
    .alert-important {
      border-left-color: var(--danger);
      background: rgba(239, 68, 68, 0.05);
    }
    .alert-note {
      border-left-color: var(--primary);
      background: rgba(59, 130, 246, 0.05);
    }
    .alert-tip {
      border-left-color: var(--secondary);
      background: rgba(16, 185, 129, 0.05);
    }
    .alert-warning {
      border-left-color: var(--warning);
      background: rgba(245, 158, 11, 0.05);
    }
    .alert-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .alert-important .alert-title { color: var(--danger); }
    .alert-note .alert-title { color: var(--primary-neon); }
    .alert-tip .alert-title { color: var(--secondary); }
    .alert-warning .alert-title { color: var(--warning); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }
    th, td {
      padding: 0.9rem 1.2rem;
      text-align: left;
    }
    th {
      background-color: rgba(59, 130, 246, 0.1);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      border-bottom: 2px solid var(--border-color);
    }
    tr {
      border-bottom: 1px solid var(--border-color);
    }
    tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.01);
    }

    /* Lists */
    ul, ol {
      margin-left: 1.5rem;
      margin-bottom: 1.2rem;
      color: #e2e8f0;
    }
    li {
      margin-bottom: 0.4rem;
    }

    /* Inline Code and Codeblocks */
    code {
      font-family: Consolas, Monaco, 'Andale Mono', monospace;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9rem;
      color: var(--primary-neon);
    }
    pre code {
      display: block;
      padding: 1.2rem;
      overflow-x: auto;
      background: #0f1423;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: #e2e8f0;
      margin: 1.5rem 0;
    }

    /* Horizontal Rules */
    hr {
      border: 0;
      height: 1px;
      background: var(--border-color);
      margin: 2.5rem 0;
    }

    /* Embedded Images */
    img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      margin: 1.5rem 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    /* Interactive Carousel Rendering */
    .carousel-container {
      background: #0d1222;
      border: 1.5px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      margin: 2.5rem 0;
      box-shadow: var(--glass-shadow);
      min-height: 400px;
    }

    .carousel-slides {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      height: 100%;
    }

    .carousel-slide {
      min-width: 100%;
      box-sizing: border-box;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      overflow-y: auto;
    }

    .carousel-slide h1 {
      font-size: 2rem;
      border-bottom: none;
      color: #ffffff;
      margin-bottom: 0.2em;
    }
    .carousel-slide h3 {
      color: var(--secondary);
      font-size: 1.15rem;
      margin-top: 0;
      margin-bottom: 1rem;
    }
    
    .carousel-slide img {
      max-height: 300px;
      object-fit: cover;
      margin: 1rem 0;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid var(--border-color);
      color: #fff;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    .carousel-btn:hover {
      background: var(--primary);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
      border-color: var(--primary-neon);
    }
    .carousel-btn-prev { left: 1rem; }
    .carousel-btn-next { right: 1rem; }

    .carousel-indicators {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }

    .carousel-indicator {
      width: 1.5rem;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .carousel-indicator.active {
      background: var(--primary-neon);
      width: 2.5rem;
    }

    /* Mermaid Rendering Styling overrides */
    .mermaid {
      background: rgba(15, 20, 35, 0.5);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: center;
      margin: 1.5rem 0;
    }

    /* LaTeX blocks centering */
    .katex-display {
      margin: 1.5rem 0;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      overflow-x: auto;
    }

    /* Footer styling */
    footer {
      text-align: center;
      padding: 3rem 0;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      margin-top: 5rem;
      font-size: 0.9rem;
    }

    /* Animation effects */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animated-content {
      animation: fadeIn 0.8s ease forwards;
    }

    /* Slides View Mode override styles */
    body.slides-mode {
      background: #070a13;
    }
    body.slides-mode .container {
      max-width: 100vw;
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 80px);
    }
    body.slides-mode .document-card {
      display: none;
    }
    body.slides-mode .slides-only-container {
      display: block;
      width: 100%;
      max-width: 1100px;
    }
    .slides-only-container {
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-icon">M</div>
      <div class="logo-text">MANTLE ARCHITECTURE REPORT</div>
    </div>
    <div class="view-modes">
      <button class="view-btn active" id="btn-doc" onclick="switchView('doc')">Document View</button>
      <button class="view-btn" id="btn-slides" onclick="switchView('slides')">Investor Slides</button>
    </div>
  </header>

  <div class="container">
    <!-- Document Mode Container -->
    <div class="document-card animated-content" id="report-content">
      <div style="text-align: center; padding: 2rem 0;">
        <p>Loading project report database...</p>
      </div>
    </div>

    <!-- Slides Mode Container -->
    <div class="slides-only-container animated-content" id="slides-deck-container">
      <!-- Carousel will be dynamically cloned/placed here in slides mode -->
    </div>
  </div>

  <footer>
    <p>© 2026 Icobo Group Conglomerate. All intellectual property rights reserved.</p>
    <p>Project Mantle Origin Sector Systems integration report.</p>
  </footer>

  <script>
    let rawMarkdown = "";

    // Switch between Document and Slides view
    function switchView(mode) {
      const btnDoc = document.getElementById("btn-doc");
      const btnSlides = document.getElementById("btn-slides");
      const slidesContainer = document.getElementById("slides-deck-container");
      
      if (mode === "doc") {
        document.body.classList.remove("slides-mode");
        btnDoc.classList.add("active");
        btnSlides.classList.remove("active");
        slidesContainer.innerHTML = "";
      } else {
        document.body.classList.add("slides-mode");
        btnSlides.classList.add("active");
        btnDoc.classList.remove("active");
        
        // Clone the rendered carousel into slides only container
        const originalCarousel = document.querySelector(".carousel-container");
        if (originalCarousel) {
          const clone = originalCarousel.cloneNode(true);
          slidesContainer.innerHTML = "";
          slidesContainer.appendChild(clone);
          initCarousel(clone);
        } else {
          slidesContainer.innerHTML = "<div class='alert alert-warning'><div class='alert-title'>Notice</div>No slides carousel found in document.</div>";
        }
      }
    }

    // Custom renderer rules for Marked
    function setupMarked() {
      const renderer = new marked.Renderer();

      // Custom blockquote rendering to convert > [!NOTE] to styled alerts
      renderer.blockquote = function(quote) {
        // Handle both string (marked < 12) and object (marked >= 12) signatures
        let rawQuote = typeof quote === 'string' ? quote : (quote.text || "");
        
        // Strip paragraph tags if present for parsing
        const cleaned = rawQuote.replace(/<\/?p>/g, '').trim();
        const match = cleaned.match(/^\[!(IMPORTANT|NOTE|TIP|WARNING)\]\s*(.*)/is);
        
        if (match) {
          const type = match[1].toLowerCase();
          const content = match[2];
          return `<div class="alert alert-${type}"><div class="alert-title">${type}</div><p>${content}</p></div>`;
        }
        return `<blockquote>${rawQuote}</blockquote>`;
      };

      // Custom codeblock rendering for carousels and mermaid
      const defaultCode = renderer.code.bind(renderer);
      renderer.code = function(code, language, escaped) {
        // Handle both string and object signatures
        let rawCode = "";
        let lang = "";
        if (typeof code === 'string') {
          rawCode = code;
          lang = language || "";
        } else if (code && typeof code === 'object') {
          rawCode = code.text || "";
          lang = code.lang || "";
        }

        if (lang === 'carousel') {
          return parseCarouselCodeblock(rawCode);
        }
        if (lang === 'mermaid') {
          return `<pre class="mermaid">${rawCode}</pre>`;
        }
        
        // Fallback to default rendering
        if (typeof code === 'string') {
          return defaultCode(code, language, escaped);
        } else {
          return defaultCode(code);
        }
      };

      marked.setOptions({
        renderer: renderer,
        gfm: true,
        breaks: true
      });
    }

    // Parse Carousel Markdown and return HTML structure
    function parseCarouselCodeblock(content) {
      const slidesContent = content.split(/<!--\s*slide\s*-->/gi);
      let slidesHTML = "";
      
      slidesContent.forEach((slideMD, index) => {
        // Render the slide markdown
        const renderedSlide = marked.parse(slideMD.trim());
        slidesHTML += `<div class="carousel-slide" data-slide-index="${index}">${renderedSlide}</div>`;
      });

      let indicatorsHTML = "";
      slidesContent.forEach((_, index) => {
        indicatorsHTML += `<div class="carousel-indicator ${index === 0 ? 'active' : ''}" onclick="jumpToSlide(this, ${index})"></div>`;
      });

      return `
        <div class="carousel-container">
          <button class="carousel-btn carousel-btn-prev" onclick="moveSlide(this, -1)">←</button>
          <button class="carousel-btn carousel-btn-next" onclick="moveSlide(this, 1)">→</button>
          <div class="carousel-slides" style="transform: translateX(0%);">
            ${slidesHTML}
          </div>
          <div class="carousel-indicators">
            ${indicatorsHTML}
          </div>
        </div>
      `;
    }

    // Carousel functionality
    function moveSlide(button, direction) {
      const container = button.closest(".carousel-container");
      const slidesWrapper = container.querySelector(".carousel-slides");
      const slides = container.querySelectorAll(".carousel-slide");
      const indicators = container.querySelectorAll(".carousel-indicator");
      
      let currentIndex = parseInt(container.dataset.currentIndex || "0");
      let nextIndex = currentIndex + direction;
      
      if (nextIndex < 0) nextIndex = slides.length - 1;
      if (nextIndex >= slides.length) nextIndex = 0;
      
      setCarouselSlide(container, nextIndex);
    }

    function jumpToSlide(indicator, index) {
      const container = indicator.closest(".carousel-container");
      setCarouselSlide(container, index);
    }

    function setCarouselSlide(container, index) {
      const slidesWrapper = container.querySelector(".carousel-slides");
      const indicators = container.querySelectorAll(".carousel-indicator");
      
      container.dataset.currentIndex = index;
      slidesWrapper.style.transform = `translateX(-${index * 100}%)`;
      
      indicators.forEach((ind, i) => {
        if (i === index) {
          ind.classList.add("active");
        } else {
          ind.classList.remove("active");
        }
      });
    }

    function initCarousel(container) {
      container.dataset.currentIndex = "0";
      const slidesWrapper = container.querySelector(".carousel-slides");
      if (slidesWrapper) {
        slidesWrapper.style.transform = `translateX(0%)`;
      }
      const indicators = container.querySelectorAll(".carousel-indicator");
      indicators.forEach((ind, i) => {
        if (i === 0) ind.classList.add("active");
        else ind.classList.remove("active");
      });
    }

    // Math parsing and rendering
    function renderMath(text) {
      // Math block elements: $$ equation $$
      let replaced = text.replace(/\$\$([\s\S]*?)\$\$/g, function(match, equation) {
        try {
          return katex.renderToString(equation.trim(), { displayMode: true, throwOnError: false });
        } catch (e) {
          return match;
        }
      });

      // Inline math elements: $ equation $
      replaced = replaced.replace(/\$([\s\S]*?)\$/g, function(match, equation) {
        try {
          return katex.renderToString(equation.trim(), { displayMode: false, throwOnError: false });
        } catch (e) {
          return match;
        }
      });

      return replaced;
    }

    // Main initialisation
    window.addEventListener('DOMContentLoaded', async () => {
      setupMarked();
      
      try {
        const response = await fetch('Mantle_Project_Report.md');
        if (!response.ok) {
          throw new Error("Failed to load Mantle_Project_Report.md");
        }
        
        rawMarkdown = await response.text();
        
        // Render Markdown to HTML
        let htmlContent = marked.parse(rawMarkdown);
        
        // Render math elements
        htmlContent = renderMath(htmlContent);

        // Put rendered HTML in container
        const target = document.getElementById("report-content");
        target.innerHTML = htmlContent;
        target.classList.add("animated-content");

        // Initialize Mermaid
        mermaid.initialize({
          theme: 'dark',
          startOnLoad: false,
          securityLevel: 'loose',
          flowchart: { useMaxWidth: true, htmlLabels: true }
        });
        
        await mermaid.run({
          nodes: document.querySelectorAll('.mermaid'),
        });

        // Initialize inline carousels in doc mode
        document.querySelectorAll(".carousel-container").forEach(container => {
          initCarousel(container);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("report-content").innerHTML = `
          <div class="alert alert-important">
            <div class="alert-title">Critical Loading Error</div>
            <p>Could not load or parse the project report markdown file: ${err.message}</p>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
